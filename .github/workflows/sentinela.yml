name: Sentinela Geopolitico v3.2
on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
    - cron: '0 21 * * *'
    - cron: '0 1  * * *'
  workflow_dispatch:
jobs:
  sentinela:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests feedparser python-dotenv
      - run: python -c "import os; k=os.environ.get('ANTHROPIC_API_KEY',''); print(f'KEY EXISTE: {bool(k)} | TAMANHO: {len(k)}')"
      - run: python sentinela.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            log_sentinela.txt
            snapshot_atual.json
            relatorio_*.txt
          retention-days: 30
